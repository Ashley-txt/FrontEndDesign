 <!DOCTYPE html>
<html lang="en">
<head>
  <title>Book Tracker</title>
  <link href="style.css" rel="stylesheet"> 
  <h1>Book Tracker</h1>
</head>
<body>   
    <!--Filter list-->
    <div class="filter">
        <button id = "all">All</button>
        <button id="Reading">Reading</button>
        <button id = "Planning">Planning To Read</button>
        <button id = "Finished">Finished</button>   
    </div>


     <div class="container">  
     <!--popup-->
        <button onclick="popupFn()", id = "add">add</button>
        <div id="overlay">
            <div id="popupBox">
              <!--input fields-->
        <form id = "insertObj">
            <!--insert book title-->
            <label>Title:</label>
            <input type="text" name="title" id="title" required>
            <!--reading status-->
            <label for="reading-stat">Reading Status:</label>
            <select id="reading-stat" name="reading-stat">
                <option value="reading">Reading</option>
                <option value="planning">Plan To Read</option>
                <option value="finished">Finished</option>
            </select>
            
            <button type="submit" id="submit">submit</button>
        </form>  
            </div>
        </div>

    <div id="main">
      <p><br>Books:</p>
    </div>
</div>
<script src="scripts.js"></script>
</body>
</html>

 <!DOCTYPE html>
<html lang="en">
<head>
  <title>Book Tracker</title>
  <link href="style.css" rel="stylesheet"> 
  <h1>Book Tracker</h1>
</head>
<body>   
    <!--Filter list-->
    <div class="filter">
        <button id = "all">All</button>
        <button id="Reading-btn">Reading</button>
        <button id = "Planning-btn">Planning To Read</button>
        <button id = "Finished-btn">Finished</button>   
    </div>


     <div class="container">  
     <!--popup-->
        <button onclick="popupFn()", id = "add">add</button>
        <button id = "delete">delete</button><button id="edit">edit</button>
        <div id="overlay">
            <div id="popupBox">
              <!--input fields-->
        <form id = "insertObj">
            <!--insert book title-->
            <label>Title:</label>
            <input type="text" name="title" id="title" required>
            
            <!--author name-->
            <br>
            <label>Author:</label>
            <input type="text" name="author" id="author">
            
            <!--reading status-->
            <br>
            <label for="reading-stat">Reading Status:</label>
            <select id="reading-stat" name="reading-stat">
                <option value="Reading">Reading</option>
                <option value="Planning">Plan To Read</option>
                <option value="Finished">Finished</option>
            </select>
            <br>
            <!--genre-->
            <label for="genre">Genre:</label>
            <input type="text" name="genre" id="genre">
            <br>

            <button type="submit" id="submit">submit</button>
            <button id="cancel">cancel</button>
        </form>  
            </div>
        </div>
        <!--edit-->
    <div id="main">
        <br>
        <p id="bookList">Books:</p>
       <ul id="list"></ul>
    </div>
</div>
<script src="scripts.js"></script>
</body>
</html>
